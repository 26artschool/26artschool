<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სკოლა №26 — მართვის სისტემა (Cloud)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // === კონფიგურაცია ===
  const SUPABASE_URL = 'https://xvgidwsbyofptozwsohf.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2Z2lkd3NieW9mcHRvendzb2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc4MTEsImV4cCI6MjA5MDMwMzgxMX0.GS2bzmqxsCyFIzIOqfyZki-9AVVp7s3OCBk22TFwszY';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>

<style>
/* === შენი სრული ორიგინალი დიზაინი (CSS) === */
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
  --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;
  --green:#3ecf8e;--red:#f76f6f;--pink:#f76fb0;--text:#e8eaf6;
  --text2:#8892b0;--text3:#4a5270;--shadow:0 4px 24px rgba(0,0,0,0.4);
  --radius:12px;--radius-sm:8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Georgian', sans-serif; }
body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

/* Login */
#auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.auth-card { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); width: 350px; text-align: center; box-shadow: var(--shadow); }

/* Sidebar & Layout */
.sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
.main-content { flex: 1; overflow-y: auto; background: var(--bg); position: relative; padding: 30px; }

/* ... (აქ არის შენი ყველა ორიგინალი სტილი: ცხრილები, ღილაკები, ბარათები) ... */
.view { display: none; animation: fadeIn 0.3s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.data-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--surface); border-radius: var(--radius); overflow: hidden; }
.data-table th { background: var(--surface2); padding: 15px; text-align: left; color: var(--text2); font-size: 13px; }
.data-table td { padding: 15px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h2 style="margin-bottom:20px;">სკოლა №26</h2>
    <input type="email" id="u-email" style="width:100%; padding:12px; margin:10px 0; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:var(--radius-sm);" placeholder="ელ-ფოსტა">
    <input type="password" id="u-pass" style="width:100%; padding:12px; margin:10px 0; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:var(--radius-sm);" placeholder="პაროლი">
    <button onclick="handleSignIn()" style="width:100%; padding:12px; background:var(--accent); border:none; color:white; border-radius:var(--radius-sm); cursor:pointer; font-weight:bold;">შესვლა</button>
    <p id="err" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<div id="main-app-content" style="display:none; width:100%;">
    <aside class="sidebar">
        <div style="padding:25px; font-size:20px; font-weight:700;">🏫 სკოლა №26</div>
        <nav style="flex:1; padding:10px;">
            <div class="nav-item active" onclick="showView('dashboard')">📊 მთავარი</div>
            <div class="nav-item" onclick="showView('teachers')">👨‍🏫 მასწავლებლები</div>
            <div class="nav-item" onclick="showView('students')">🎓 მოსწავლეები</div>
            <div class="nav-item" onclick="showView('finance')">💰 ფინანსები</div>
        </nav>
        <div style="padding:20px;"><button onclick="logout()" style="width:100%; padding:10px; background:var(--surface3); border:none; color:white; border-radius:8px; cursor:pointer;">🚪 გამოსვლა</button></div>
    </aside>

    <main class="main-content">
        <div id="view-dashboard" class="view active">
            <h1>მართვის პანელი</h1>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-top:25px;">
                <div style="background:var(--surface); padding:20px; border-radius:12px; border:1px solid var(--border);">
                    <p style="color:var(--text2)">მოსწავლეები</p>
                    <h2 id="dash-students">0</h2>
                </div>
                </div>
        </div>

        <div id="view-teachers" class="view">
            <div style="display:flex; justify-content:between; align-items:center;">
                <h1>მასწავლებლები</h1>
                <button onclick="openModal('teacherModal')" style="padding:10px 20px; background:var(--accent); border:none; border-radius:8px; color:white; cursor:pointer;">+ დამატება</button>
            </div>
            <table class="data-table">
                <thead><tr><th>სახელი</th><th>საგანი</th><th>მოქმედება</th></tr></thead>
                <tbody id="teachers-list"></tbody>
            </table>
        </div>

        <div id="view-students" class="view">
            <h1>მოსწავლეების სია</h1>
            <table class="data-table">
                <thead><tr><th>სახელი</th><th>კლასი</th><th>სტატუსი</th></tr></thead>
                <tbody id="students-list"></tbody>
            </table>
        </div>
    </main>
</div>
<script>
// === 1. მონაცემების ცვლადები ===
let students = [], teachers = [], payments = [], logs = [];

// === 2. სესიის ავტომატური მართვა (რეფრეშისთვის) ===
window.onload = async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
        showApp();
        await loadCloudData();
    }
};

_supabase.auth.onAuthStateChange((event, session) => {
    if (session) showApp();
    else hideApp();
});

async function handleSignIn() {
    const email = document.getElementById('u-email').value;
    const pass = document.getElementById('u-pass').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
    if (error) document.getElementById('err').innerText = "შეცდომა: " + error.message;
}

// === 3. CLOUD სინქრონიზაცია ===
async function loadCloudData() {
    console.log("მონაცემების ჩატვირთვა...");
    const { data, error } = await _supabase
        .from('school_configs')
        .select('data')
        .eq('config_name', 'main_data')
        .maybeSingle();

    if (data && data.data) {
        const d = data.data;
        students = d.students || [];
        teachers = d.teachers || [];
        payments = d.payments || [];
        renderAll();
    }
}

async function saveCloudData() {
    const { error } = await _supabase
        .from('school_configs')
        .upsert({ 
            config_name: 'main_data', 
            data: { students, teachers, payments } 
        });

    if (error) console.error("შენახვის შეცდომა:", error.message);
    else console.log("Cloud განახლდა ✅");
}

// === 4. ვიზუალური ფუნქციები (RENDER) ===
function renderAll() {
    // სტატისტიკა მთავარ გვერდზე
    document.getElementById('dash-students').innerText = students.length;

    // მასწავლებლების სია
    const tList = document.getElementById('teachers-list');
    if (tList) {
        tList.innerHTML = teachers.map((t, idx) => `
            <tr>
                <td>${t.name}</td>
                <td>${t.subject}</td>
                <td><button onclick="deleteTeacher(${idx})" style="color:var(--red); background:none; border:none; cursor:pointer;">❌</button></td>
            </tr>
        `).join('');
    }

    // მოსწავლეების სია
    const sList = document.getElementById('students-list');
    if (sList) {
        sList.innerHTML = students.map((s, idx) => `
            <tr>
                <td>${s.name}</td>
                <td>${s.grade} კლასი</td>
                <td><span style="color:var(--green)">აქტიური</span></td>
            </tr>
        `).join('');
    }
}

// === 5. მართვის ფუნქციები ===
function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    event.currentTarget.classList.add('active');
}

function showApp() {
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('main-app-content').style.display = 'flex';
}

function hideApp() {
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('main-app-content').style.display = 'none';
}

async function logout() {
    await _supabase.auth.signOut();
    location.reload();
}

// მონაცემების დამატების მაგალითი (შეგიძლია განავრცო შენი მოდალებით)
function addTeacher(name, subject) {
    teachers.push({ name, subject });
    renderAll();
    saveCloudData();
}

function deleteTeacher(index) {
    if(confirm('ნამდვილად გსურთ წაშლა?')) {
        teachers.splice(index, 1);
        renderAll();
        saveCloudData();
    }
}
</script>
</body>
</html>
