<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სკოლა №26 — მართვის სისტემა</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* --- შენი ორიგინალი სტილები (უცვლელად) --- */
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
  --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;
  --green:#3ecf8e;--red:#f76f6f;--pink:#f76fb0;--text:#e8eaf6;
  --text2:#8892b0;--text3:#4a5270;--boy:#4f8ef7;--girl:#f76fb0;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;outline:none;}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px;}
#sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);position:relative;}
.sidebar-logo .school-num{font-size:28px;font-weight:700;color:var(--accent);line-height:1;}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent);color:#fff;}
#main{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;position:relative;}
#content{flex:1;overflow-y:auto;padding:24px;}
.view{display:none;animation:viewFade 0.25s ease-out;}
.view.active{display:block;}
@keyframes viewFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.stat-value{font-size:22px;font-weight:700;color:var(--text);}

/* Auth Overlay Style */
#auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.auth-box { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); width: 340px; text-align: center; }
.auth-box input { width: 100%; padding: 12px; margin: 10px 0; background: var(--surface2); border: 1px solid var(--border); color: white; border-radius: var(--radius-sm); }

/* --- AI Chat & Other Original Styles --- */
#ai-chat{position:fixed;bottom:24px;right:24px;width:320px;height:400px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;box-shadow:var(--shadow);z-index:1000;overflow:hidden;}
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-box">
    <h2 style="color:var(--accent); margin-bottom:20px;">სკოლა №26</h2>
    <input type="email" id="u-email" placeholder="ელ-ფოსტა">
    <input type="password" id="u-pass" placeholder="პაროლი">
    <button onclick="handleSignIn()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700;">შესვლა</button>
    <p id="err" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<div id="app-container" style="display:none; width:100%; height:100vh;">
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="school-num">№26</div>
      <div style="font-size:11px; color:var(--text3)">მართვის სისტემა</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" onclick="showView('dashboard', this)">📊 სტატისტიკა</div>
      <div class="nav-item" onclick="showView('departments', this)">🏛️ განყოფილებები</div>
      <div class="nav-item" onclick="showView('students', this)">👥 მოსწავლეები</div>
      <div class="nav-item" onclick="showView('teachers', this)">👩‍🏫 პედაგოგები</div>
      <div class="nav-item" onclick="showView('finance', this)">💰 გადახდები</div>
    </div>
    <div style="padding:16px; border-top:1px solid var(--border); cursor:pointer; font-size:12px; color:var(--text3);" onclick="logout()">🚪 გამოსვლა</div>
  </div>

  <div id="main">
    <div id="content">
      <div id="view-dashboard" class="view active">
        <div class="stats-row" id="dash-stats"></div>
        <div style="background:var(--surface); padding:20px; border-radius:12px; border:1px solid var(--border);">
          <canvas id="chart-main" height="150"></canvas>
        </div>
      </div>
      
      <div id="view-departments" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2>განყოფილებები</h2>
          <button onclick="addDept()" style="padding:8px 16px; background:var(--accent); border:none; border-radius:8px; color:white; cursor:pointer;">+ დამატება</button>
        </div>
        <div id="dept-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px;"></div>
      </div>

      <div id="view-students" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2>მოსწავლეები</h2>
          <button onclick="addStudent()" style="padding:8px 16px; background:var(--accent); border:none; border-radius:8px; color:white; cursor:pointer;">+ მოსწავლის დამატება</button>
        </div>
        <div style="overflow-x:auto;">
          <table id="students-table" style="width:100%; border-collapse:collapse; background:var(--surface); border-radius:12px; overflow:hidden;">
            <thead style="background:var(--surface2);">
              <tr><th style="padding:12px; text-align:left;">სახელი</th><th style="padding:12px; text-align:left;">გვარი</th><th style="padding:12px; text-align:left;">სქესი</th><th style="padding:12px; text-align:left;">მოქმედება</th></tr>
            </thead>
            <tbody id="students-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xvgidwsbyofptozwsohf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // შენი გასაღები
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data = { departments: [], students: [], teachers: [], payments: [] };
let mainChart = null;

window.onload = async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        await loadAllData();
    }
};

async function handleSignIn() {
    const email = document.getElementById('u-email').value;
    const pass = document.getElementById('u-pass').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
    if (error) document.getElementById('err').innerText = "არასწორი მონაცემები!";
    else location.reload();
}

async function loadAllData() {
    const { data: cloudData } = await _supabase.from('school_configs').select('data').eq('config_name', 'main_data').maybeSingle();
    if (cloudData && cloudData.data) {
        data = cloudData.data;
    }
    renderAll();
}

async function saveAllData() {
    await _supabase.from('school_configs').upsert({ config_name: 'main_data', data: data });
}

function renderAll() {
    // Stats
    document.getElementById('dash-stats').innerHTML = `
        <div class="stat-card"><div class="stat-label">მოსწავლე</div><div class="stat-value">${data.students.length}</div></div>
        <div class="stat-card"><div class="stat-label">პედაგოგი</div><div class="stat-value">${data.teachers.length}</div></div>
        <div class="stat-card"><div class="stat-label">განყოფილება</div><div class="stat-value">${data.departments.length}</div></div>
    `;

    // Students Table
    document.getElementById('students-body').innerHTML = data.students.map((s, i) => `
        <tr style="border-bottom:1px solid var(--border)">
            <td style="padding:12px;">${s.firstName}</td>
            <td style="padding:12px;">${s.lastName}</td>
            <td style="padding:12px;"><span style="color:${s.gender==='male'?'var(--boy)':'var(--girl)'}">${s.gender==='male'?'♂':'♀'}</span></td>
            <td style="padding:12px;"><button onclick="deleteStudent(${i})" style="background:none; border:none; cursor:pointer;">🗑️</button></td>
        </tr>
    `).join('');

    // Dept Cards
    document.getElementById('dept-grid').innerHTML = data.departments.map(d => `
        <div style="background:var(--surface); padding:20px; border-radius:12px; border:1px solid var(--border); border-bottom:4px solid ${d.color}">
            <div style="font-size:24px; margin-bottom:10px;">${d.icon}</div>
            <div style="font-weight:700;">${d.name}</div>
        </div>
    `).join('');

    initChart();
}

function addStudent() {
    const firstName = prompt("სახელი:");
    const lastName = prompt("გვარი:");
    if(firstName && lastName) {
        data.students.push({ firstName, lastName, gender: 'male', id: Date.now() });
        saveAllData();
        renderAll();
    }
}

function deleteStudent(i) {
    if(confirm('წავშალოთ?')) {
        data.students.splice(i, 1);
        saveAllData();
        renderAll();
    }
}

function showView(viewId, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + viewId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

function initChart() {
    const ctx = document.getElementById('chart-main').getContext('2d');
    if(mainChart) mainChart.destroy();
    mainChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['იან', 'თებ', 'მარ', 'აპრ', 'მაი'],
            datasets: [{
                label: 'მოსწავლეები',
                data: [data.students.length-2, data.students.length-1, data.students.length, data.students.length, data.students.length],
                borderColor: '#4f8ef7',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(79, 142, 247, 0.1)'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { grid: { color: '#2e3352' } }, x: { grid: { display: false } } }
        }
    });
}

async function logout() { await _supabase.auth.signOut(); location.reload(); }
</script>
</body>
</html>
