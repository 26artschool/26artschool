<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სკოლა №26 — მართვის პანელი</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://xvgidwsbyofptozwsohf.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2Z2lkd3NieW9mcHRvendzb2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc4MTEsImV4cCI6MjA5MDMwMzgxMX0.GS2bzmqxsCyFIzIOqfyZki-9AVVp7s3OCBk22TFwszY
';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>

<style>
:root {
  --bg:#0f1117; --surface:#181c27; --surface2:#1e2336;
  --border:#2e3352; --accent:#4f8ef7; --text:#e8eaf6;
  --text2:#8892b0; --green:#3ecf8e; --red:#f76f6f;
  --radius:12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Georgian', sans-serif; }
body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

/* Auth UI */
#auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.auth-card { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); width: 350px; text-align: center; }
.auth-input { width: 100%; padding: 12px; margin: 10px 0; background: var(--surface2); border: 1px solid var(--border); color: white; border-radius: 8px; outline: none; }

/* Main App Layout */
#main-app-content { display: none; width: 100%; height: 100%; }
.sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar-header { padding: 30px; font-size: 20px; font-weight: 700; color: var(--accent); }
.nav-item { padding: 15px 30px; cursor: pointer; color: var(--text2); transition: 0.3s; }
.nav-item:hover, .nav-item.active { background: var(--surface2); color: white; }
.main-content { flex: 1; padding: 40px; overflow-y: auto; }
.view { display: none; }
.view.active { display: block; }

/* Table & UI Elements */
.card { background: var(--surface); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 25px; }
.btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
.btn-primary { background: var(--accent); color: white; }
.btn-danger { background: rgba(247, 111, 111, 0.1); color: var(--red); border: 1px solid var(--red); }
.data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
.data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h2 style="margin-bottom:20px;">სკოლა №26</h2>
    <input type="email" id="u-email" class="auth-input" placeholder="ელ-ფოსტა">
    <input type="password" id="u-pass" class="auth-input" placeholder="პაროლი">
    <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="handleSignIn()">შესვლა</button>
    <p id="err" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<div id="main-app-content">
    <aside class="sidebar">
        <div class="sidebar-header">🏫 სკოლა №26</div>
        <nav style="flex:1;">
            <div class="nav-item active" onclick="showView('dashboard')">📊 მთავარი</div>
            <div class="nav-item" onclick="showView('teachers')">👨‍🏫 მასწავლებლები</div>
            <div class="nav-item" onclick="showView('students')">🎓 მოსწავლეები</div>
        </nav>
        <div style="padding:20px;"><button class="btn btn-danger" style="width:100%;" onclick="logout()">🚪 გამოსვლა</button></div>
    </aside>

    <main class="main-content">
        <div id="view-dashboard" class="view active">
            <h1>მართვის პანელი</h1>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:30px;">
                <div class="card"><h3>მოსწავლეები</h3><h2 id="count-s" style="color:var(--accent); font-size:32px;">0</h2></div>
                <div class="card"><h3>მასწავლებლები</h3><h2 id="count-t" style="color:var(--green); font-size:32px;">0</h2></div>
            </div>
        </div>

        <div id="view-teachers" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>მასწავლებლები</h1>
                <button class="btn btn-primary" onclick="addTeacher()">+ დამატება</button>
            </div>
            <div class="card" style="margin-top:20px;">
                <table class="data-table">
                    <thead><tr><th>სახელი</th><th>საგანი</th><th>მოქმედება</th></tr></thead>
                    <tbody id="t-body"></tbody>
                </table>
            </div>
        </div>

        <div id="view-students" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>მოსწავლეები</h1>
                <button class="btn btn-primary" onclick="addStudent()">+ დამატება</button>
            </div>
            <div class="card" style="margin-top:20px;">
                <table class="data-table">
                    <thead><tr><th>სახელი</th><th>სტატუსი</th><th>მოქმედება</th></tr></thead>
                    <tbody id="s-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
let students = [], teachers = [], payments = [];

// === LOGIN & SESSION ===
window.onload = async () => {
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) { showApp(); await loadCloudData(); }
};

async function handleSignIn() {
    const email = document.getElementById('u-email').value;
    const pass = document.getElementById('u-pass').value;
    const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });
    if (error) { document.getElementById('err').innerText = error.message; }
    else { location.reload(); }
}

// === DATA SYNC ===
async function loadCloudData() {
    const { data } = await _supabase.from('school_configs').select('data').eq('config_name', 'main_data').maybeSingle();
    if (data && data.data) {
        students = data.data.students || [];
        teachers = data.data.teachers || [];
        renderAll();
    }
}

async function saveCloudData() {
    await _supabase.from('school_configs').upsert({ config_name: 'main_data', data: { students, teachers, payments } });
}

// === LOGIC ===
function renderAll() {
    document.getElementById('count-s').innerText = students.length;
    document.getElementById('count-t').innerText = teachers.length;
    document.getElementById('t-body').innerHTML = teachers.map((t, i) => `<tr><td>${t.name}</td><td>${t.subject}</td><td><button class="btn btn-danger" onclick="delT(${i})">❌</button></td></tr>`).join('');
    document.getElementById('s-body').innerHTML = students.map((s, i) => `<tr><td>${s.name}</td><td>აქტიური</td><td><button class="btn btn-danger" onclick="delS(${i})">❌</button></td></tr>`).join('');
}

function addTeacher() { const name = prompt("სახელი:"); const sub = prompt("საგანი:"); if(name && sub) { teachers.push({name, subject:sub}); renderAll(); saveCloudData(); } }
function addStudent() { const name = prompt("მოსწავლე:"); if(name) { students.push({name}); renderAll(); saveCloudData(); } }
function delT(i) { if(confirm('წავშალო?')) { teachers.splice(i,1); renderAll(); saveCloudData(); } }
function delS(i) { if(confirm('წავშალო?')) { students.splice(i,1); renderAll(); saveCloudData(); } }

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
}
function showApp() { document.getElementById('auth-overlay').style.display='none'; document.getElementById('main-app-content').style.display='flex'; }
async function logout() { await _supabase.auth.signOut(); location.reload(); }
</script>
</body>
</html>
