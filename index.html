<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>სკოლა №26 — მართვის ერთიანი სისტემა</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0d0f14; --surface: #161922; --surface2: #1e2330; --border: #2e3545;
            --accent: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.4);
            --green: #10b981; --red: #ef4444; --text: #f3f4f6; --text2: #94a3b8; --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Georgian', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Auth */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { background: var(--surface); padding: 50px; border-radius: 24px; border: 1px solid var(--border); width: 400px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-item { padding: 14px 25px; margin: 4px 12px; border-radius: 10px; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--surface2); color: white; }
        .nav-item.active { border-left: 4px solid var(--accent); background: rgba(59, 130, 246, 0.1); color: var(--accent); }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #1a1f35, #0d0f14); }
        .view { display: none; } .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Stats & Cards */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-card .val { font-size: 32px; font-weight: 700; color: var(--accent); margin: 5px 0; }
        
        .card { background: var(--surface); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 25px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 15px; color: var(--text2); font-size: 13px; border-bottom: 2px solid var(--border); }
        .data-table td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .btn { padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="margin-bottom: 30px;">სკოლა №26</h2>
        <input type="email" id="u-email" style="width:100%; padding:15px; margin-bottom:15px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:10px;" placeholder="ელ-ფოსტა">
        <input type="password" id="u-pass" style="width:100%; padding:15px; margin-bottom:25px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:10px;" placeholder="პაროლი">
        <button class="btn btn-primary" style="width:100%;" onclick="handleSignIn()">შესვლა</button>
        <p id="err" style="color:var(--red); margin-top:15px; font-size:13px;"></p>
    </div>
</div>

<div id="main-app-content" style="display:none; width:100%;">
    <aside class="sidebar">
        <div style="padding:40px 30px; font-weight:800; font-size:22px; color:var(--accent);">🏫 სკოლა №26</div>
        <nav style="flex:1;">
            <div class="nav-item active" onclick="showView('dashboard')">📊 მთავარი პანელი</div>
            <div class="nav-item" onclick="showView('teachers')">👨‍🏫 მასწავლებლები</div>
            <div class="nav-item" onclick="showView('students')">🎓 მოსწავლეები</div>
            <div class="nav-item" onclick="showView('finance')">💰 ფინანსები</div>
        </nav>
        <div style="padding:25px;"><button class="btn" style="width:100%; background:var(--surface2); color:white;" onclick="logout()">🚪 გამოსვლა</button></div>
    </aside>

    <main class="main-content">
        <div id="view-dashboard" class="view active">
            <h1>მიმოხილვა</h1>
            <div class="stat-grid" style="margin-top:25px;">
                <div class="stat-card"><h3>მოსწავლე</h3><div class="val" id="c-s">0</div></div>
                <div class="stat-card"><h3>მასწავლებელი</h3><div class="val" id="c-t">0</div></div>
                <div class="stat-card"><h3>აქტივობა</h3><div class="val">98%</div></div>
                <div class="stat-card"><h3>შემოსავალი</h3><div class="val" id="c-f">0 ₾</div></div>
            </div>
            <div class="card"><h3>სტატისტიკური გრაფიკი</h3><div style="height:300px; margin-top:20px;"><canvas id="mainChart"></canvas></div></div>
        </div>

        <div id="view-teachers" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center;"><h1>პერსონალი</h1><button class="btn btn-primary" onclick="addTeacher()">+ დამატება</button></div>
            <div class="card" style="margin-top:25px;"><table class="data-table"><thead><tr><th>სახელი</th><th>საგანი</th><th>სტატუსი</th><th>მოქმედება</th></tr></thead><tbody id="t-body"></tbody></table></div>
        </div>

        <div id="view-students" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center;"><h1>მოსწავლეები</h1><button class="btn btn-primary" onclick="addStudent()">+ დამატება</button></div>
            <div class="card" style="margin-top:25px;"><table class="data-table"><thead><tr><th>სახელი</th><th>კლასი</th><th>სტატუსი</th><th>მოქმედება</th></tr></thead><tbody id="s-body"></tbody></table></div>
        </div>
    </main>
</div>

<script>
    const SUPABASE_URL = 'https://xvgidwsbyofptozwsohf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2Z2lkd3NieW9mcHRvendzb2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc4MTEsImV4cCI6MjA5MDMwMzgxMX0.GS2bzmqxsCyFIzIOqfyZki-9AVVp7s3OCBk22TFwszY';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let students = [], teachers = [], payments = [], myChart = null;

    window.onload = async () => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) { showApp(); await loadCloudData(); }
    };

    async function handleSignIn() {
        const email = document.getElementById('u-email').value;
        const pass = document.getElementById('u-pass').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if (error) document.getElementById('err').innerText = error.message;
        else location.reload();
    }

    async function loadCloudData() {
        const { data } = await _supabase.from('school_configs').select('data').eq('config_name', 'main_data').maybeSingle();
        if (data && data.data) {
            students = data.data.students || [];
            teachers = data.data.teachers || [];
            renderAll();
        }
    }

    async function saveCloudData() {
        await _supabase.from('school_configs').upsert({ config_name: 'main_data', data: { students, teachers, payments } });
    }

    function renderAll() {
        document.getElementById('c-s').innerText = students.length;
        document.getElementById('c-t').innerText = teachers.length;
        document.getElementById('c-f').innerText = (students.length * 150) + " ₾";

        document.getElementById('t-body').innerHTML = teachers.map((t, i) => `<tr><td><b>${t.name}</b></td><td>${t.subject}</td><td><span class="badge" style="background:rgba(59,130,246,0.1); color:var(--accent)">შტატში</span></td><td><button onclick="delT(${i})">🗑️</button></td></tr>`).join('');
        document.getElementById('s-body').innerHTML = students.map((s, i) => `<tr><td><b>${s.name}</b></td><td>${s.grade || '1'} კლასი</td><td><span class="badge" style="background:rgba(16,185,129,0.1); color:var(--green)">აქტიური</span></td><td><button onclick="delS(${i})">🗑️</button></td></tr>`).join('');
        
        initChart();
    }

    function addTeacher() { const n = prompt("სახელი:"); const s = prompt("საგანი:"); if(n && s) { teachers.push({name:n, subject:s}); saveCloudData(); renderAll(); } }
    function addStudent() { const n = prompt("მოსწავლე:"); const g = prompt("კლასი:"); if(n) { students.push({name:n, grade:g}); saveCloudData(); renderAll(); } }
    function delT(i) { if(confirm('წავშალო?')) { teachers.splice(i,1); saveCloudData(); renderAll(); } }
    function delS(i) { if(confirm('წავშალო?')) { students.splice(i,1); saveCloudData(); renderAll(); } }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['იან', 'თებ', 'მარ', 'აპრ'], datasets: [{ label: 'მოსწავლეები', data: [students.length-2, students.length-1, students.length, students.length], borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function showApp() { document.getElementById('auth-overlay').style.display='none'; document.getElementById('main-app-content').style.display='flex'; }
    async function logout() { await _supabase.auth.signOut(); location.reload(); }
</script>
</body>
</html>
