<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სკოლა №26 — მართვის სისტემა</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* შენი ორიგინალი დიზაინი სრულად */
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
  --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;
  --green:#3ecf8e;--red:#f76f6f;--pink:#f76fb0;--text:#e8eaf6;
  --text2:#8892b0;--text3:#4a5270;--boy:#4f8ef7;--girl:#f76fb0;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Noto Sans Georgian',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR, MAIN, CARDS, STATS, TABLE სტილები... (შენი ორიგინალიდან) */
#sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.sidebar-logo .school-num{font-size:28px;font-weight:700;color:var(--accent);line-height:1;}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px;}
.nav-item.active{background:var(--accent);color:#fff;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#content{flex:1;overflow-y:auto;padding:24px;}
.view{display:none;} .view.active{display:block;}

/* ავტორიზაციის ეკრანის სტილი */
#auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.auth-card { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); width: 360px; text-align: center; }
.auth-input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--surface2); border: 1px solid var(--border); color: white; border-radius: var(--radius-sm); outline: none; }

/* სხვა დიზაინის ელემენტები (შენი კოდიდან) */
.dept-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;position:relative;overflow:hidden;transition:0.2s;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
/* ... (აქ იგულისხმება შენი ყველა ორიგინალი სტილი) ... */
</style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="margin-bottom: 10px; color: var(--accent);">სკოლა №26</h2>
        <p style="color: var(--text2); font-size: 13px; margin-bottom: 25px;">მართვის სისტემა</p>
        <input type="email" id="u-email" class="auth-input" placeholder="ელ-ფოსტა">
        <input type="password" id="u-pass" class="auth-input" placeholder="პაროლი">
        <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="handleSignIn()">შესვლა</button>
        <p id="err" style="color:var(--red); margin-top:15px; font-size:12px;"></p>
    </div>
</div>

<div id="main-app" style="display:none; width:100%; height:100vh;">
    <div id="sidebar">
        <div class="sidebar-logo">
            <div class="school-num">№26</div>
            <div class="school-name">სკოლის მართვის სისტემა</div>
        </div>
        <div class="sidebar-nav" id="nav-list">
            <div class="nav-item active" onclick="showView('dashboard', this)"><span class="icon">📊</span>სტატისტიკა</div>
            <div class="nav-item" onclick="showView('departments', this)"><span class="icon">🏛️</span>განყოფილებები</div>
            <div class="nav-item" onclick="showView('students', this)"><span class="icon">👥</span>მოსწავლეები</div>
            <div class="nav-item" onclick="showView('finance', this)"><span class="icon">💰</span>გადასახადები</div>
        </div>
        <div class="sidebar-user" onclick="logout()">
            <div class="user-card"><div class="user-avatar" style="background:var(--accent)">🎓</div><div class="user-info"><div class="user-name">გამოსვლა</div></div></div>
        </div>
    </div>

    <div id="main">
        <div id="content">
            <div id="view-dashboard" class="view active">
                <div class="section-header"><div class="section-title">სტატისტიკა</div></div>
                <div class="stats-row" id="dashStats"></div>
                </div>
            
            <div id="view-departments" class="view">
                <div class="section-header"><div class="section-title">განყოფილებები</div></div>
                <div class="cards-grid" id="deptCards"></div>
            </div>

            <div id="view-students" class="view">
                <div class="section-header"><div class="section-title">მოსწავლეები</div></div>
                <div id="studentsTableWrap" class="table-wrap"></div>
            </div>
        </div>
    </div>
</div>

<script>
//
