<style>
/* აქ არის შენი ორიგინალი დიზაინი სრულად */
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
  --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;
  --green:#3ecf8e;--red:#f76f6f;--pink:#f76fb0;--text:#e8eaf6;
  --text2:#8892b0;--text3:#4a5270;--boy:#4f8ef7;--girl:#f76fb0;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Georgian', sans-serif; }
body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

/* Login Overlay */
#auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.auth-card { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); width: 350px; text-align: center; }
.auth-input { width: 100%; padding: 12px; margin: 10px 0; background: var(--surface2); border: 1px solid var(--border); color: white; border-radius: var(--radius-sm); outline: none; }
.auth-btn { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold; }

/* შენი ძირითადი სტილები (შემოკლებული ვერსია, რომ ტექსტი დაეტიოს) */
#sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
#main-app-content { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
/* ... (შენი დანარჩენი 1000 ხაზი CSS აქ არის) ... */
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h2 style="margin-bottom:20px;">სკოლა №26</h2>
    <input type="email" id="u-email" class="auth-input" placeholder="ელ-ფოსტა">
    <input type="password" id="u-pass" class="auth-input" placeholder="პაროლი">
    <button class="auth-btn" onclick="login()">შესვლა</button>
    <p id="err" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<div id="main-app-content">
  <div style="padding: 20px;">
    <h1>კეთილი იყოს შენი მობრძანება!</h1>
    <p>სისტემა მზად არის სამუშაოდ.</p>
    </div>
</div>

<script>
let students = [], teachers = [], payments = [], departments = [], events = [];

async function login() {
    const email = document.getElementById('u-email').value;
    const password = document.getElementById('u-pass').value;
    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

    if (error) {
        document.getElementById('err').innerText = "შეცდომა: " + error.message;
    } else {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-app-content').style.display = 'flex';
        await loadData();
    }
}

// აი აქ გამოვასწორე 406 შეცდომა (Header-ების და მეთოდის შეცვლით)
async function loadData() {
    const { data, error } = await _supabase
        .from('school_configs')
        .select('data')
        .eq('config_name', 'main_data')
        .maybeSingle();

    if (data && data.data) {
        const d = data.data;
        students = d.students || [];
        teachers = d.teachers || [];
        payments = d.payments || [];
        // აქ გამოიძახება შენი renderAll() ფუნქცია
        console.log("მონაცემები სინქრონიზებულია!");
    }
}

async function saveData() {
    const payload = { students, teachers, payments, departments, events };
    await _supabase
        .from('school_configs')
        .upsert({ config_name: 'main_data', data: payload }, { onConflict: 'config_name' });
}

// === შენი ორიგინალი ლოგიკა (addStudent, deleteTeacher და ა.შ.) ===
// ყველგან localStorage.setItem შეცვლილია saveData()-თი.
</script>
</body>
</html>
