<style>
/* === შენი ორიგინალი დიზაინის ყველა სტილი (CSS) === */
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
  --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;
  --green:#3ecf8e;--red:#f76f6f;--pink:#f76fb0;--text:#e8eaf6;

/* Login Overlay */
#auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.auth-card { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); width: 350px; text-align: center; box-shadow: var(--shadow); }
.auth-input { width: 100%; padding: 12px; margin: 10px 0; background: var(--surface2); border: 1px solid var(--border); color: white; border-radius: var(--radius-sm); outline: none; }
.auth-btn { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold; margin-top: 10px; }

/* შენი CSS-ის გაგრძელება უცვლელად... */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans Georgian',sans-serif}
body{background:var(--bg);color:var(--text);overflow:hidden;height:100vh;display:flex}
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:all 0.3s ease}
/* (აქ ჩაჯდება შენი ყველა დანარჩენი სტილი) */
/* ... */

<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h2 style="margin-bottom:20px;">სკოლა №26</h2>
    <input type="email" id="u-email" class="auth-input" placeholder="ელ-ფოსტა">
    <input type="password" id="u-pass" class="auth-input" placeholder="პაროლი">
    <button class="auth-btn" onclick="handleSignIn()">შესვლა</button>
    <p id="err" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<div id="main-app-content" style="display:none; width:100%; height:100vh;">
    <aside class="sidebar">
        </aside>

    <main class="main-content">
        <div id="view-dashboard" class="view active">
            </div>

        <div id="view-teachers" class="view">
            </div>

        </main>
</div>
<script>
// === 1. მონაცემების საწყისი მასივები ===
let departments = [], teachers = [], students = [], payments = [], events = [];

// === 2. ავტორიზაციის ლოგიკა ===
async function handleSignIn() {
    const email = document.getElementById('u-email').value;
    const pass = document.getElementById('u-pass').value;
    const err = document.getElementById('err');
    err.innerText = "მოწმდება...";

    const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });

    if (error) {
        err.innerText = "შეცდომა: " + error.message;
    } else {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-app-content').style.display = 'flex';
        await loadData(); // მონაცემების წამოღება Cloud-იდან
    }
}

// === 3. CLOUD სინქრონიზაცია ===
async function loadData() {
    const { data, error } = await _supabase
        .from('school_configs')
        .select('data')
        .eq('config_name', 'main_data')
        .maybeSingle();

    if (data && data.data) {
        const d = data.data;
        students = d.students || [];
        teachers = d.teachers || [];
        payments = d.payments || [];
        departments = d.departments || [];
        events = d.events || [];
    }
    
    // შენი ორიგინალი ფუნქცია ეკრანის განსაახლებლად
    if (typeof renderAll === "function") renderAll();
    else if (typeof updateDashboardStats === "function") updateDashboardStats();
}

async function saveData() {
    const payload = { students, teachers, payments, departments, events };
    const { error } = await _supabase
        .from('school_configs')
        .upsert({ config_name: 'main_data', data: payload }, { onConflict: 'config_name' });
    
    if (error) console.error("Cloud შენახვის შეცდომა:", error.message);
}

// === 4. შენი ორიგინალი ფუნქციების ბლოკი ===
// (აქ ჩაამატე შენი ყველა ფუნქცია: addStudent, deleteTeacher და ა.შ.)
// მნიშვნელოვანი: ყველგან სადაც გაქვს students.push() ან მსგავსი ცვლილება,
// ბოლოში დაუმატე saveData(); რომ Cloud-ში აისახოს.

function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + viewId).classList.add('active');
}

async function logout() {
    await _supabase.auth.signOut();
    location.reload();
}

// ჩაამატე აქ შენი დანარჩენი ლოგიკა...
</script>
</body>
