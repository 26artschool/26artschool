<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>სკოლა №26 — სრული მართვის სისტემა</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #0f1117; --surface: #181c27; --surface2: #1e2336; --surface3: #242840;
            --border: #2e3352; --accent: #4f8ef7; --accent-hover: #3b76d4;
            --green: #3ecf8e; --red: #f76f6f; --text: #e8eaf6; --text2: #8892b0;
            --radius: 12px; --shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Georgian', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Auth Screen */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { background: var(--surface); padding: 50px; border-radius: 20px; border: 1px solid var(--border); width: 400px; text-align: center; box-shadow: var(--shadow); }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 40px 30px; }
        .logo-box { display: flex; align-items: center; gap: 15px; font-size: 22px; font-weight: 800; color: var(--accent); }
        
        .nav-group { padding: 10px; flex: 1; }
        .nav-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; padding: 20px 20px 10px; opacity: 0.5; }
        .nav-item { 
            padding: 14px 20px; margin: 4px 10px; border-radius: 10px; cursor: pointer; 
            color: var(--text2); display: flex; align-items: center; gap: 12px; transition: all 0.3s;
        }
        .nav-item:hover { background: var(--surface2); color: white; transform: translateX(5px); }
        .nav-item.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(79,142,247,0.3); }

        /* Main Area */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at 0% 0%, #1a1f35 0%, #0f1117 100%); }
        .view { display: none; } .view.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Stats Cards */
        .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; margin-bottom: 40px; }
        .stat-card { background: var(--surface); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border); transition: 0.3s; }
        .stat-card h3 { font-size: 14px; color: var(--text2); margin-bottom: 15px; }
        .stat-card .value { font-size: 32px; font-weight: 700; }

        /* Tables & UI */
        .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 25px; margin-bottom: 30px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { padding: 18px; text-align: left; color: var(--text2); font-size: 13px; border-bottom: 2px solid var(--border); }
        .data-table td { padding: 18px; border-bottom: 1px solid var(--border); }
        
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: rgba(62,207,142,0.1); color: var(--green); }

        .btn { padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">

        <h2>სკოლა №26</h2>

        <input type="password" id="u-pass" style="width:100%; padding:15px; margin-bottom:20px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:10px;" placeholder="პაროლი">
        <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="handleSignIn()">ავტორიზაცია</button>
        <p id="err" style="color:var(--red); margin-top:15px; font-size:13px;"></p>
    </div>
</div>

        </div>

    </aside>

    <main class="main-content">
        <div id="view-dashboard" class="view active">

            <div class="grid-stats" style="margin-top:30px;">
                <div class="stat-card"><h3>მოსწავლეები</h3><div class="value" id="c-s">0</div></div>
                <div class="stat-card"><h3>მასწავლებლები</h3><div class="value" id="c-t" style="color:var(--green)">0</div></div>
                <div class="stat-card"><h3>დეპარტამენტი</h3><div class="value" id="c-d" style="color:var(--accent)">0</div></div>
                <div class="stat-card"><h3>ბიუჯეტი</h3><div class="value" id="c-f">0 ₾</div></div>
            </div>
            <div class="card"><h3>აქტივობის გრაფიკი</h3><div style="height:300px; margin-top:20px;"><canvas id="mainChart"></canvas></div></div>
        </div>

        <div id="view-teachers" class="view">
            <div style="display:flex; justify-content:space-between; margin-bottom:30px;"><h1>პერსონალი</h1><button class="btn btn-primary" onclick="addTeacher()">+ დამატება</button></div>
            <div class="card"><table class="data-table"><thead><tr><th>სახელი</th><th>საგანი</th><th>ოთახი</th><th>მოქმედება</th></tr></thead><tbody id="t-body"></tbody></table></div>
        </div>

        <div id="view-students" class="view">
            <div style="display:flex; justify-content:space-between; margin-bottom:30px;"><h1>მოსწავლეები</h1><button class="btn btn-primary" onclick="addStudent()">+ დამატება</button></div>
            <div class="card"><table class="data-table"><thead><tr><th>სახელი</th><th>კლასი</th><th>სტატუსი</th><th>მოქმედება</th></tr></thead><tbody id="s-body"></tbody></table></div>
        </div>
    </main>
</div>
