<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სკოლა №26 — Cloud მართვა</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // === ჩასვი შენი მონაცემები აქ (ბრჭყალები არ წაშალო!) ===
  const SUPABASE_URL = 'https://xvgidwsbyofptozwsohf.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2Z2lkd3NieW9mcHRvendzb2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc4MTEsImV4cCI6MjA5MDMwMzgxMX0.GS2bzmqxsCyFIzIOqfyZki-9AVVp7s3OCBk22TFwszY';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>

<style>
:root {
  --bg:#0f1117; --surface:#181c27; --surface2:#1e2336;
  --border:#2e3352; --accent:#4f8ef7; --text:#e8eaf6; --red:#f76f6f;
  --radius:12px; --radius-sm:8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Georgian', sans-serif; }
body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

/* Login */
#auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
.auth-card { background: var(--surface); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); width: 350px; text-align: center; }
.auth-input { width: 100%; padding: 12px; margin: 10px 0; background: var(--surface2); border: 1px solid var(--border); color: white; border-radius: var(--radius-sm); outline: none; }
.auth-btn { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold; }

/* Main UI */
#main-app-content { display: none; width: 100%; height: 100%; display: flex; }
.sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
.content { flex: 1; padding: 30px; overflow-y: auto; }
.nav-item { padding: 12px; cursor: pointer; border-radius: var(--radius-sm); margin-bottom: 5px; }
.nav-item:hover { background: var(--surface2); }
.nav-item.active { background: var(--accent); color: white; }
.view { display: none; }
.view.active { display: block; }
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h2 style="margin-bottom:20px;">სკოლა №26</h2>
    <input type="email" id="u-email" class="auth-input" placeholder="ელ-ფოსტა">
    <input type="password" id="u-pass" class="auth-input" placeholder="პაროლი">
    <button class="auth-btn" onclick="handleSignIn()">შესვლა</button>
    <p id="err" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<div id="main-app-content">
    <aside class="sidebar">
        <h3 style="margin-bottom: 20px;">🏫 სკოლა №26</h3>
        <div class="nav-item active" onclick="showView('dashboard')">📊 მთავარი</div>
        <div class="nav-item" onclick="showView('students')">🎓 მოსწავლეები</div>
        <div style="margin-top: auto;">
            <button class="auth-btn" style="background:#333;" onclick="logout()">🚪 გამოსვლა</button>
        </div>
    </aside>

    <main class="content">
        <div id="view-dashboard" class="view active">
            <h1>მართვის პანელი</h1>
            <p style="margin-top:20px;">მოგესალმებით, სისტემა მზად არის.</p>
            <div id="stats-summary" style="margin-top:20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div style="background:var(--surface2); padding:20px; border-radius:var(--radius);">მოსწავლეები: <span id="stud-count">0</span></div>
                <div style="background:var(--surface2); padding:20px; border-radius:var(--radius);">მასწავლებლები: <span id="teach-count">0</span></div>
            </div>
        </div>

        <div id="view-students" class="view">
            <h1>მოსწავლეების სია</h1>
            <button class="auth-btn" style="width:auto; padding: 10px 20px;" onclick="addTestStudent()">+ ტესტ მოსწავლე</button>
            <ul id="student-list" style="margin-top:20px;"></ul>
        </div>
    </main>
</div>

<script>
let students = [], teachers = [];

async function handleSignIn() {
    const email = document.getElementById('u-email').value;
    const pass = document.getElementById('u-pass').value;
    const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });

    if (error) {
        document.getElementById('err').innerText = error.message;
    } else {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-app-content').style.display = 'flex';
        await loadCloudData();
    }
}

async function loadCloudData() {
    const { data, error } = await _supabase.from('school_configs').select('data').eq('config_name', 'main_data').maybeSingle();
    if (data && data.data) {
        students = data.data.students || [];
        teachers = data.data.teachers || [];
        renderAll();
    }
}

async function saveCloudData() {
    const payload = { students, teachers };
    await _supabase.from('school_configs').upsert({ config_name: 'main_data', data: payload }, { onConflict: 'config_name' });
}

function renderAll() {
    document.getElementById('stud-count').innerText = students.length;
    document.getElementById('teach-count').innerText = teachers.length;
    const list = document.getElementById('student-list');
    list.innerHTML = students.map(s => `<li>${s.name}</li>`).join('');
}

function addTestStudent() {
    students.push({ name: "ახალი მოსწავლე " + (students.length + 1) });
    renderAll();
    saveCloudData();
}

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    event.currentTarget.classList.add('active');
}

async function logout() {
    await _supabase.auth.signOut();
    location.reload();
}
</script>
</body>
</html>
