<style>
/* 1. შენი ორიგინალი დიზაინის ყველა სტილი (CSS) */
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#242840;
  --border:#2e3352;--accent:#4f8ef7;--accent2:#7c5cfc;--accent3:#f7c948;

/* Login Overlay Styles */
#auth-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  z-index: 10000;

  border: none; color: white; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600;
}

/* შენი ორიგინალი CSS-ის გაგრძელება */

<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h2>სკოლა №26</h2>
    <input type="email" id="auth-email" placeholder="ელ-ფოსტა">
    <input type="password" id="auth-pass" placeholder="პაროლი">
    <button onclick="handleSignIn()">შესვლა</button>
  </div>
</div>

<div id="main-app-ui">
  <aside class="sidebar">...</aside>
  <main class="main-content">...</main>
</div>

<script>
// === მონაცემების მასივები ===
let students = [], payments = [], departments = [], teachers = [], events = [];

// === LOGIN LOGIC ===
async function handleSignIn() {
  const email = document.getElementById('auth-email').value;
  const pass = document.getElementById('auth-pass').value;
  
  const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });
  
  if (error) {
    alert("შეცდომა: " + error.message);
  } else {
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('main-app-ui').style.display = 'flex';
    await syncFromCloud(); // შევდივართ და ეგრევე მოგვაქვს ბაზა
  }
}

// === CLOUD SYNC ===
async function syncFromCloud() {
  const { data, error } = await _supabase
    .from('school_configs')
    .select('data')
    .eq('config_name', 'main_data')
    .single();

  if (data && data.data) {
    const cloud = data.data;
    students = cloud.students || [];
    payments = cloud.payments || [];
    departments = cloud.departments || [];
    teachers = cloud.teachers || [];
    events = cloud.events || [];
    
    // მონაცემების ჩატვირთვის შემდეგ ვაახლებთ ეკრანს
    if (typeof renderAll === "function") renderAll();
  }
}

async function saveData() {
  const payload = { students, payments, departments, teachers, events };
  
  const { error } = await _supabase
    .from('school_configs')
    .upsert({ config_name: 'main_data', data: payload }, { onConflict: 'config_name' });

  if (error) console.error("Sync Error:", error.message);
}

// === შენი ორიგინალი ფუნქციების ჩაშენება ===
// (ყველა ფუნქცია, რომელიც ადრე LocalStorage-ს იყენებდა, ახლა გამოიყენებს saveData()-ს)

function addStudent(studentData) {
    students.push(studentData);
    saveData(); // ავტომატურად ინახება Supabase-ში
    renderAll();
}

// ... და ასე შემდეგ ყველა ფუნქცია ...

</script>
