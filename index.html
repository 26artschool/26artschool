<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>სკოლა №26 — სრული მართვის სისტემა</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xvgidwsbyofptozwsohf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2Z2lkd3NieW9mcHRvendzb2hmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3Mjc4MTEsImV4cCI6MjA5MDMwMzgxMX0.GS2bzmqxsCyFIzIOqfyZki-9AVVp7s3OCBk22TFwszY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <style>
        :root {
            --bg:#0f1117; --surface:#181c27; --surface2:#1e2336; --border:#2e3352;
            --accent:#4f8ef7; --green:#3ecf8e; --red:#f76f6f; --text:#e8eaf6;
            --text2:#8892b0; --radius:12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans Georgian', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; }
        .nav-item { padding: 14px 25px; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 12px; transition: 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background: var(--surface2); color: white; border-left-color: var(--accent); }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; background: radial-gradient(circle at top right, #1a1f35, #0f1117); }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & Tables */
        .card { background: var(--surface); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card h3 { font-size: 13px; color: var(--text2); text-transform: uppercase; margin-bottom: 10px; }
        .stat-card h2 { font-size: 28px; color: var(--accent); }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th { text-align: left; padding: 15px; color: var(--text2); font-size: 13px; border-bottom: 1px solid var(--border); background: var(--surface2); }
        .data-table td { padding: 15px; border-bottom: 1px solid var(--border); }
        
        /* Buttons & Inputs */
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: rgba(247, 111, 111, 0.1); color: var(--red); border: 1px solid var(--red); }
    </style>
</head>
<body>
    <div id="auth-overlay" style="position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:10000;">
        <div class="card" style="width:350px; text-align:center;">
            <h2 style="margin-bottom:20px;">სკოლა №26</h2>
            <input type="email" id="u-email" style="width:100%; padding:12px; margin:10px 0; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px;" placeholder="ელ-ფოსტა">
            <input type="password" id="u-pass" style="width:100%; padding:12px; margin:10px 0; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px;" placeholder="პაროლი">
            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="handleSignIn()">შესვლა</button>
            <p id="err" style="color:var(--red); font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="main-app-content" style="display:none; width:100%; height: 100vh;">
        <aside class="sidebar">
            <div style="padding:30px; font-weight:700; font-size:20px; color:var(--accent);">🏫 სკოლა №26</div>
            <nav style="flex:1;">
                <div class="nav-item active" onclick="showView('dashboard')">📊 მთავარი</div>
                <div class="nav-item" onclick="showView('teachers')">👨‍🏫 მასწავლებლები</div>
                <div class="nav-item" onclick="showView('students')">🎓 მოსწავლეები</div>
                <div class="nav-item" onclick="showView('departments')">🏢 დეპარტამენტები</div>
                <div class="nav-item" onclick="showView('finance')">💰 ფინანსები</div>
            </nav>
            <div style="padding:20px;"><button class="btn btn-danger" style="width:100%; justify-content:center;" onclick="logout()">🚪 გამოსვლა</button></div>
        </aside>

        <main class="main-content">
            <div id="view-dashboard" class="view active">
                <h1>მართვის პანელი</h1>
                <div class="stat-grid" style="margin-top:25px;">
                    <div class="card stat-card"><h3>მოსწავლე</h3><h2 id="c-s">0</h2></div>
                    <div class="card stat-card"><h3>მასწავლებელი</h3><h2 id="c-t">0</h2></div>
                    <div class="card stat-card"><h3>დეპარტამენტი</h3><h2 id="c-d">0</h2></div>
                    <div class="card stat-card"><h3>ბიუჯეტი</h3><h2 id="c-f">0 ₾</h2></div>
                </div>
                <div class="card" style="height: 300px;"><canvas id="mainChart"></canvas></div>
            </div>

            <div id="view-teachers" class="view">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1>მასწავლებლები</h1>
                    <button class="btn btn-primary" onclick="addTeacher()">+ დამატება</button>
                </div>
                <div class="card" style="margin-top:20px;">
                    <table class="data-table">
                        <thead><tr><th>სახელი</th><th>საგანი</th><th>კაბინეტი</th><th>მოქმედება</th></tr></thead>
                        <tbody id="t-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-students" class="view">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1>მოსწავლეები</h1>
                    <button class="btn btn-primary" onclick="addStudent()">+ დამატება</button>
                </div>
                <div class="card" style="margin-top:20px;">
                    <table class="data-table">
                        <thead><tr><th>სახელი</th><th>კლასი</th><th>სტატუსი</th><th>მოქმედება</th></tr></thead>
                        <tbody id="s-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-departments" class="view">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1>დეპარტამენტები</h1>
                    <button class="btn btn-primary" onclick="addDept()">+ დამატება</button>
                </div>
                <div id="dept-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-top:20px;"></div>
            </div>
        </main>
    </div>

    <script>
        let students = [], teachers = [], depts = [], payments = [], myChart = null;

        window.onload = async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) { showApp(); await loadCloudData(); }
        };

        async function handleSignIn() {
            const email = document.getElementById('u-email').value;
            const pass = document.getElementById('u-pass').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
            if (error) document.getElementById('err').innerText = error.message;
            else location.reload();
        }

        async function loadCloudData() {
            const { data } = await _supabase.from('school_configs').select('data').eq('config_name', 'main_data').maybeSingle();
            if (data && data.data) {
                const d = data.data;
                students = d.students || [];
                teachers = d.teachers || [];
                depts = d.depts || [];
                payments = d.payments || [];
                renderAll();
            }
        }

        async function saveCloudData() {
            await _supabase.from('school_configs').upsert({ 
                config_name: 'main_data', 
                data: { students, teachers, depts, payments } 
            });
        }

        function renderAll() {
            document.getElementById('c-s').innerText = students.length;
            document.getElementById('c-t').innerText = teachers.length;
            document.getElementById('c-d').innerText = depts.length;

            // Render Teachers
            document.getElementById('t-body').innerHTML = teachers.map((t, i) => `
                <tr><td>${t.name}</td><td>${t.subject}</td><td>${t.room || '-'}</td><td><button onclick="delT(${i})">❌</button></td></tr>
            `).join('');

            // Render Students
            document.getElementById('s-body').innerHTML = students.map((s, i) => `
                <tr><td>${s.name}</td><td>${s.grade || '-'}</td><td><span style="color:var(--green)">აქტიური</span></td><td><button onclick="delS(${i})">❌</button></td></tr>
            `).join('');

            // Render Departments
            document.getElementById('dept-grid').innerHTML = depts.map((d, i) => `
                <div class="card"><h3>${d.name}</h3><p style="color:var(--text2); margin-top:10px;">ხელმძღვანელი: ${d.head || '-'}</p></div>
            `).join('');

            initChart();
        }

        function addTeacher() {
            const name = prompt("სახელი:");
            const sub = prompt("საგანი:");
            if(name && sub) { teachers.push({name, subject:sub}); renderAll(); saveCloudData(); }
        }

        function addStudent() {
            const name = prompt("მოსწავლე:");
            if(name) { students.push({name}); renderAll(); saveCloudData(); }
        }

        function addDept() {
            const name = prompt("დეპარტამენტის სახელი:");
            if(name) { depts.push({name}); renderAll(); saveCloudData(); }
        }

        function delT(i) { teachers.splice(i,1); renderAll(); saveCloudData(); }
        function delS(i) { students.splice(i,1); renderAll(); saveCloudData(); }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['იან', 'თებ', 'მარ', 'აპრ'],
                    datasets: [{ label: 'აქტივობა', data: [10, 25, 15, students.length + 10], borderColor: '#4f8ef7', tension: 0.4, fill: true, backgroundColor: 'rgba(79, 142, 247, 0.1)' }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#2e3352' } }, x: { grid: { display: false } } } }
            });
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function showApp() { document.getElementById('auth-overlay').style.display='none'; document.getElementById('main-app-content').style.display='block'; }
        async function logout() { await _supabase.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
